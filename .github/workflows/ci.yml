name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" — do not duplicate here

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

  python:
    name: Python lint + skill verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps for verify + tests
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy sympy numba torch qiskit qiskit-aer pennylane cirq \
                      amazon-braket-sdk matplotlib networkx mpmath pandas chromadb \
                      sentence-transformers fastapi "uvicorn[standard]" slowapi
          pip install -r compute/requirements-dev.txt

      - name: Python syntax check
        run: |
          python -m py_compile scripts/*.py akashic/*.py agents/**/*.py || true
          python -m pyflakes scripts/ akashic/ agents/ || true

      - name: Run test suite
        env:
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: python -m pytest -q

      - name: Skill verify (syntax check)
        continue-on-error: true
        run: python -m py_compile agents/core/agent.py agents/core/orchestrator.py agents/core/registry.py

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" — do not duplicate here

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm audit
        run: pnpm audit --audit-level=high || true

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-audit
        run: |
          pip install pip-audit
          # Ignored advisories (documented):
          #   CVE-2026-45829 — chromadb FastAPI *server* only; we use PersistentClient (embedded).
          #   CVE-2025-3000  — torch.jit.script local memory corruption; no upstream fix; this
          #                    sovereign node never feeds untrusted input to torch.jit.script.
          pip-audit -r compute/requirements.txt \
            --ignore-vuln CVE-2026-45829 \
            --ignore-vuln CVE-2025-3000

  console:
    name: dsh-console (lint + unit + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dsh-console
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" — do not duplicate here

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dsh-console/pnpm-lock.yaml

      # better-sqlite3 native build is authorized via dsh-console/pnpm-workspace.yaml
      # (onlyBuiltDependencies). src/lib/db.ts requires the compiled addon.
      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests (playwright — builds first)
        run: pnpm test:e2e
