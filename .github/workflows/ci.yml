name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" — do not duplicate here

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

  python:
    name: Python lint + skill verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps for verify
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy sympy numba torch qiskit pennylane cirq \
                      matplotlib networkx mpmath pandas chromadb \
                      sentence-transformers

      - name: Python syntax check
        run: |
          python -m py_compile scripts/*.py akashic/*.py agents/**/*.py || true
          python -m pyflakes scripts/ akashic/ agents/ || true

      - name: Pre-spore skill verify
        run: python scripts/pre-spore-verify.py

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" — do not duplicate here

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm audit
        run: pnpm audit --audit-level=high || true

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r compute/requirements.txt || true
